
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--navy:#0f172a;--navy2:#1e293b;--navy3:#334155;--navy4:#475569;
--slate:#64748b;--slate2:#94a3b8;--slate3:#cbd5e1;--slate4:#e2e8f0;
--accent:#38bdf8;--accent2:#0ea5e9;--accent-dim:#0c4a6e;
--amber:#f59e0b;--amber-dim:#451a03;
--emerald:#10b981;--em-dim:#064e3b;
--rose:#f43f5e;--rose-dim:#4c0519;
--purple:#a78bfa;--purple-dim:#2e1065;
--text1:#f1f5f9;--text2:#cbd5e1;--text3:#94a3b8;--text4:#64748b;
--card:#1e293b;--border:#334155;
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--navy);color:var(--text1);min-height:100vh;font-size:14px}
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');

.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--navy2);border-bottom:1px solid var(--border);padding:0 1.25rem;display:flex;align-items:center;gap:1rem;height:56px;position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:600;color:var(--text1);display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.search-wrap{flex:1;max-width:400px;position:relative}
.search-wrap input{width:100%;background:var(--navy3);border:1px solid var(--border);border-radius:8px;padding:7px 12px 7px 34px;color:var(--text1);font-size:13px;outline:none}
.search-wrap input::placeholder{color:var(--text4)}
.search-wrap input:focus{border-color:var(--accent2)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text4);pointer-events:none}
.btn{border:1px solid var(--border);background:var(--navy3);color:var(--text1);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s}
.btn:hover{background:var(--navy4);border-color:var(--slate)}
.btn-accent{background:var(--accent2);border-color:var(--accent2);color:#fff;font-weight:500}
.btn-accent:hover{background:var(--accent);border-color:var(--accent)}

.main{display:flex;flex:1}
.sidebar{width:200px;background:var(--navy2);border-right:1px solid var(--border);padding:1rem 0;flex-shrink:0;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 1rem;color:var(--text3);font-size:13px;cursor:pointer;border-left:2px solid transparent;transition:all .15s}
.nav-item:hover{color:var(--text1);background:rgba(255,255,255,.04)}
.nav-item.active{color:var(--text1);border-left-color:var(--accent);background:rgba(56,189,248,.06)}
.nav-badge{margin-left:auto;background:var(--rose);color:#fff;border-radius:99px;font-size:11px;padding:1px 7px;font-weight:500}
.nav-badge.warn{background:var(--amber)}
.sidebar-section{padding:8px 1rem 4px;color:var(--text4);font-size:11px;letter-spacing:.06em;text-transform:uppercase;margin-top:8px}

.content{flex:1;overflow-y:auto;padding:1.5rem}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.stat-val{font-size:22px;font-weight:600;color:var(--text1)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.stat-accent{color:var(--accent)}
.stat-rose{color:var(--rose)}
.stat-amber{color:var(--amber)}
.stat-em{color:var(--emerald)}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.section-title{font-size:14px;font-weight:500;color:var(--text2)}
.filter-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tag-pill{border:1px solid var(--border);background:var(--navy3);color:var(--text3);border-radius:99px;padding:4px 12px;font-size:12px;cursor:pointer;transition:all .15s}
.tag-pill:hover{border-color:var(--slate);color:var(--text2)}
.tag-pill.active{background:var(--accent-dim);border-color:var(--accent2);color:var(--accent)}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.contact-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .18s;position:relative}
.contact-card:hover{border-color:var(--slate);background:#253347}
.contact-card.overdue{border-color:rgba(244,63,94,.3)}
.contact-card.overdue::after{content:'90d+';position:absolute;top:10px;right:10px;background:var(--rose-dim);color:var(--rose);border-radius:99px;font-size:10px;padding:2px 7px;font-weight:500;border:1px solid rgba(244,63,94,.3)}

.card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;flex-shrink:0}
.card-name{font-weight:500;font-size:14px;color:var(--text1);margin-bottom:2px}
.card-role{font-size:12px;color:var(--text3)}
.warmth{display:flex;gap:2px;margin-top:6px}
.star{font-size:12px;color:var(--navy4)}
.star.lit{color:var(--amber)}

.card-meta{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.meta-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)}
.meta-icon{color:var(--text4);flex-shrink:0}

.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.ctag{border-radius:99px;font-size:10px;padding:2px 8px;font-weight:500;border:1px solid}
.ctag-blue{background:rgba(14,165,233,.12);color:#38bdf8;border-color:rgba(14,165,233,.2)}
.ctag-purple{background:rgba(167,139,250,.12);color:#c4b5fd;border-color:rgba(167,139,250,.2)}
.ctag-em{background:rgba(16,185,129,.12);color:#34d399;border-color:rgba(16,185,129,.2)}
.ctag-amber{background:rgba(245,158,11,.12);color:#fcd34d;border-color:rgba(245,158,11,.2)}
.ctag-rose{background:rgba(244,63,94,.12);color:#fb7185;border-color:rgba(244,63,94,.2)}

.card-divider{height:1px;background:var(--border);margin:10px 0}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.help-me{font-size:11px;color:var(--emerald);display:flex;align-items:center;gap:4px}
.superpower{font-size:11px;color:var(--purple);display:flex;align-items:center;gap:4px}

.attn-section{background:rgba(244,63,94,.06);border:1px solid rgba(244,63,94,.2);border-radius:12px;padding:1.25rem;margin-bottom:1.5rem}
.attn-header{display:flex;align-items:center;gap:8px;color:var(--rose);font-weight:500;font-size:14px;margin-bottom:1rem}
.attn-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(244,63,94,.1)}
.attn-row:last-child{border-bottom:none}
.attn-days{font-size:11px;color:var(--rose);font-weight:600;margin-left:auto;white-space:nowrap}
.attn-name{font-size:13px;font-weight:500;color:var(--text1)}
.attn-role{font-size:11px;color:var(--text3)}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:2rem 1rem}
.modal{background:var(--navy2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:560px;margin:auto}
.modal-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:600;color:var(--text1)}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;line-height:1;padding:4px}
.modal-body{padding:1.5rem;display:flex;flex-direction:column;gap:1rem}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:12px;color:var(--text3);font-weight:500}
.form-input{background:var(--navy3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text1);font-size:13px;outline:none;width:100%}
.form-input:focus{border-color:var(--accent2)}
.form-input::placeholder{color:var(--text4)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.warmth-select{display:flex;gap:8px;align-items:center}
.warmth-btn{background:var(--navy3);border:1px solid var(--border);border-radius:8px;padding:8px 16px;color:var(--text3);cursor:pointer;font-size:13px;transition:all .15s}
.warmth-btn:hover{border-color:var(--amber);color:var(--amber)}
.warmth-btn.sel{background:rgba(245,158,11,.15);border-color:var(--amber);color:var(--amber);font-weight:500}
.modal-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

.empty{text-align:center;padding:3rem;color:var(--text4);font-size:13px}

.detail-modal .modal-body{padding:0}
.detail-top{padding:1.5rem;display:flex;gap:1rem;align-items:flex-start}
.detail-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:18px;flex-shrink:0}
.detail-info{flex:1}
.detail-name{font-size:17px;font-weight:600;color:var(--text1);margin-bottom:2px}
.detail-role{font-size:13px;color:var(--text3);margin-bottom:8px}
.detail-section{border-top:1px solid var(--border);padding:1rem 1.5rem}
.detail-section-title{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text4);margin-bottom:10px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.detail-item{background:var(--navy);border-radius:8px;padding:10px 12px}
.detail-item-label{font-size:10px;color:var(--text4);margin-bottom:4px}
.detail-item-val{font-size:13px;color:var(--text2);font-weight:500}
.recip-box{background:var(--navy);border-radius:8px;padding:12px;margin-bottom:8px}
.recip-box-label{font-size:11px;color:var(--text4);margin-bottom:4px}
.recip-box-val{font-size:13px;color:var(--text2);line-height:1.5}
.recip-em{color:var(--emerald)}
.recip-purple{color:var(--purple)}

@media(max-width:640px){
.sidebar{display:none}
.stats-row{grid-template-columns:1fr 1fr}
.cards-grid{grid-template-columns:1fr}
.form-row{grid-template-columns:1fr}
}
</style>

<div class="app" id="app">
<div class="topbar">
  <div class="logo"><div class="logo-dot"></div>Rolodex</div>
  <div class="search-wrap">
    <span class="search-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </span>
    <input type="text" id="searchInput" placeholder="Search name, tag, company..." />
  </div>
  <button class="btn btn-accent" onclick="openAddModal()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    Add Contact
  </button>
</div>
<div class="main">
  <div class="sidebar">
    <div class="nav-item active" onclick="setTab('all',this)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      All Contacts
    </div>
    <div class="nav-item" onclick="setTab('attn',this)" id="attnNav">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      Needs Attention
      <span class="nav-badge" id="attnBadge">0</span>
    </div>
    <div class="sidebar-section">Filter by tag</div>
    <div id="sidebarTags"></div>
  </div>
  <div class="content" id="mainContent"></div>
</div>
</div>

<div id="addModal" style="display:none" class="modal-bg">
<div class="modal">
  <div class="modal-header">
    <span class="modal-title" id="modalTitle">Add Contact</span>
    <button class="modal-close" onclick="closeModal('addModal')">×</button>
  </div>
  <div class="modal-body">
    <input type="hidden" id="editId" />
    <div class="form-row">
      <div class="form-group"><label class="form-label">Full Name *</label><input class="form-input" id="fName" placeholder="Alex Rivera" /></div>
      <div class="form-group"><label class="form-label">Role / Title</label><input class="form-input" id="fRole" placeholder="Founder @ Acme" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="fEmail" type="email" placeholder="alex@acme.com" /></div>
      <div class="form-group"><label class="form-label">Company</label><input class="form-input" id="fCompany" placeholder="Acme Inc." /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Where we met</label><input class="form-input" id="fMet" placeholder="NFX Summit, SF" /></div>
      <div class="form-group"><label class="form-label">Last interaction</label><input class="form-input" id="fLast" type="date" /></div>
    </div>
    <div class="form-group"><label class="form-label">How I can help them</label><input class="form-input" id="fHelp" placeholder="Intro to Series A investors, product feedback..." /></div>
    <div class="form-group"><label class="form-label">Their unique superpowers</label><input class="form-input" id="fSuper" placeholder="Deep GTM expertise, ML infra knowledge..." /></div>
    <div class="form-group"><label class="form-label">Tags <span style="color:var(--text4)">(comma separated)</span></label><input class="form-input" id="fTags" placeholder="Investor, NYC, SaaS, Mentor" /></div>
    <div class="form-group">
      <label class="form-label">Relationship Warmth</label>
      <div class="warmth-select" id="warmthSelect">
        <button class="warmth-btn" onclick="setWarmth(1)">1 — Cold</button>
        <button class="warmth-btn" onclick="setWarmth(2)">2</button>
        <button class="warmth-btn" onclick="setWarmth(3)">3 — Warm</button>
        <button class="warmth-btn" onclick="setWarmth(4)">4</button>
        <button class="warmth-btn" onclick="setWarmth(5)">5 — Close</button>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" id="fNotes" rows="2" placeholder="Context, shared interests, follow-ups..."></textarea></div>
  </div>
  <div class="modal-footer">
    <button class="btn" onclick="closeModal('addModal')">Cancel</button>
    <button class="btn btn-accent" onclick="saveContact()">Save Contact</button>
  </div>
</div>
</div>

<div id="detailModal" style="display:none" class="modal-bg">
<div class="modal detail-modal">
  <div class="modal-header">
    <span class="modal-title">Contact Details</span>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn" id="editBtn" onclick="editCurrent()">Edit</button>
      <button class="modal-close" onclick="closeModal('detailModal')">×</button>
    </div>
  </div>
  <div id="detailBody"></div>
</div>
</div>

<script>
const COLORS=[
  {bg:'#0c4a6e',text:'#38bdf8'},{bg:'#2e1065',text:'#c4b5fd'},
  {bg:'#064e3b',text:'#34d399'},{bg:'#451a03',text:'#fcd34d'},
  {bg:'#4c0519',text:'#fb7185'},{bg:'#1e3a5f',text:'#7dd3fc'},
  {bg:'#1a1a2e',text:'#a78bfa'}
];
function colorFor(name){const i=name.charCodeAt(0)%COLORS.length;return COLORS[i]}
function initials(name){return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
function daysSince(dateStr){if(!dateStr)return null;const d=new Date(dateStr);const now=new Date();return Math.floor((now-d)/(1000*60*60*24))}
function tagClass(t){const l=t.toLowerCase();if(l.includes('invest'))return'ctag-amber';if(l.includes('dev')||l.includes('eng'))return'ctag-blue';if(l.includes('creat')||l.includes('design'))return'ctag-purple';if(l.includes('mentor')||l.includes('advis'))return'ctag-em';return'ctag-rose'}

let contacts=[];
let selectedWarmth=3;
let currentTab='all';
let activeTagFilter=null;
let currentDetailId=null;

function load(){
  const raw=localStorage.getItem('crm_contacts');
  if(raw)contacts=JSON.parse(raw);
  else contacts=getSample();
  render();
}
function save(){localStorage.setItem('crm_contacts',JSON.stringify(contacts))}

function getSample(){
  const today=new Date();
  function daysAgo(n){const d=new Date(today);d.setDate(d.getDate()-n);return d.toISOString().split('T')[0]}
  return[
    {id:'1',name:'Maya Chen',role:'Partner @ Sequoia',company:'Sequoia Capital',email:'maya@sequoia.com',met:'YC Demo Day',last:daysAgo(12),help:'Intro to seed-stage founders in my network',super:'Sees product-market fit before anyone else',tags:['Investor','Partner','SF'],warmth:5,notes:'Met at YC W24 demo day. She led Series A for two of my portfolio co-founders.'},
    {id:'2',name:'Jordan Ellis',role:'Head of Engineering',company:'Stripe',email:'jellis@stripe.com',met:'SFNode Meetup',last:daysAgo(95),help:'Technical review of API design, hiring advice',super:'Deep distributed systems expertise, incredible communicator',tags:['Engineer','Developer','SF','FinTech'],warmth:3,notes:''},
    {id:'3',name:'Priya Nair',role:'Creative Director',company:'IDEO',email:'priya@ideo.com',met:'Design Matters Conf',last:daysAgo(110),help:'Product design critique sessions',super:'Makes complex systems feel intuitive and human',tags:['Designer','Creative','NYC','Mentor'],warmth:4,notes:'Potential advisor.'},
    {id:'4',name:'Marcus Webb',role:'Founder & CEO',company:'Luma Labs',email:'mw@lumalabs.io',met:'AngelList intro',last:daysAgo(20),help:'Warm intros to enterprise customers in media vertical',super:'Hypergrowth operator, raised $40M in 18 months',super:'Series A operator, fast ship',tags:['Founder','Investor','NYC','AI'],warmth:4,notes:''},
    {id:'5',name:'Leila Osman',role:'ML Research Scientist',company:'DeepMind',email:'leila@deepmind.com',met:'NeurIPS 2023',last:daysAgo(130),help:'Translate research papers into product ideas',super:'State-of-the-art in multimodal reasoning',tags:['Researcher','AI','ML','London'],warmth:2,notes:''},
    {id:'6',name:'Tom Nakamura',role:'Product Lead',company:'Linear',email:'tom@linear.app',met:'Product Hunt community',last:daysAgo(45),help:'Beta user feedback, community intros',super:'Obsessive about developer UX and workflow tools',tags:['Product','Developer','Remote'],warmth:3,notes:'Loves talking about async workflows.'},
  ];
}

function render(){
  const search=document.getElementById('searchInput').value.toLowerCase();
  const attn=contacts.filter(c=>daysSince(c.last)>90);
  document.getElementById('attnBadge').textContent=attn.length;
  document.getElementById('attnNav').querySelector('.nav-badge').style.display=attn.length?'inline':'none';

  let filtered=contacts.filter(c=>{
    if(search){
      const hay=(c.name+c.role+c.company+(c.tags||[]).join(' ')+(c.met||'')+(c.email||'')).toLowerCase();
      if(!hay.includes(search))return false;
    }
    if(activeTagFilter){
      if(!(c.tags||[]).map(t=>t.toLowerCase()).some(t=>t.includes(activeTagFilter.toLowerCase())))return false;
    }
    return true;
  });

  const allTags=[...new Set(contacts.flatMap(c=>c.tags||[]))].sort();
  const sidebarTags=document.getElementById('sidebarTags');
  sidebarTags.innerHTML=allTags.map(t=>`<div class="nav-item${activeTagFilter===t?' active':''}" onclick="filterTag('${t}')" style="font-size:12px;padding:7px 1rem">#${t}</div>`).join('');

  const mc=document.getElementById('mainContent');
  const stats=`<div class="stats-row">
    <div class="stat-card"><div class="stat-label">Total Contacts</div><div class="stat-val stat-accent">${contacts.length}</div><div class="stat-sub">in your network</div></div>
    <div class="stat-card"><div class="stat-label">Needs Attention</div><div class="stat-val stat-rose">${attn.length}</div><div class="stat-sub">over 90 days silent</div></div>
    <div class="stat-card"><div class="stat-label">Strong Ties</div><div class="stat-val stat-em">${contacts.filter(c=>c.warmth>=4).length}</div><div class="stat-sub">warmth 4+</div></div>
    <div class="stat-card"><div class="stat-label">Unique Tags</div><div class="stat-val stat-amber">${allTags.length}</div><div class="stat-sub">across network</div></div>
  </div>`;

  if(currentTab==='attn'){
    if(!attn.length){mc.innerHTML=stats+'<div class="empty">No contacts need attention right now. Well done.</div>';return}
    mc.innerHTML=stats+`<div class="section-header"><span class="section-title" style="color:var(--rose)">Needs Attention — ${attn.length} contact${attn.length!==1?'s':''} silent 90+ days</span></div>
    <div class="attn-section">
      <div class="attn-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        Reach out — relationships fade fast
      </div>
      ${attn.sort((a,b)=>daysSince(b.last)-daysSince(a.last)).map(c=>{
        const col=colorFor(c.name);const d=daysSince(c.last);
        return`<div class="attn-row" onclick="openDetail('${c.id}')" style="cursor:pointer">
          <div class="avatar" style="width:34px;height:34px;font-size:12px;background:${col.bg};color:${col.text}">${initials(c.name)}</div>
          <div><div class="attn-name">${c.name}</div><div class="attn-role">${c.role||''}</div></div>
          <div class="attn-days">${d} days ago</div>
        </div>`}).join('')}
    </div>
    <div class="section-header" style="margin-top:1.5rem"><span class="section-title">All ${attn.length} contacts</span></div>
    <div class="cards-grid">${attn.map(renderCard).join('')}</div>`;
  } else {
    const tags=[...new Set(filtered.flatMap(c=>c.tags||[]))].sort();
    const tagBar=tags.length>0?`<div class="filter-bar">${tags.map(t=>`<span class="tag-pill${activeTagFilter===t?' active':''}" onclick="filterTag('${t}')">#${t}</span>`).join('')}</div>`:'';
    mc.innerHTML=stats+`<div class="section-header"><span class="section-title">${filtered.length} contact${filtered.length!==1?'s':''}</span>${tagBar}</div>
    ${filtered.length?`<div class="cards-grid">${filtered.map(renderCard).join('')}</div>`:'<div class="empty">No contacts match your search.</div>'}`;
  }
}

function renderCard(c){
  const col=colorFor(c.name);const days=daysSince(c.last);const overdue=days>90;
  const stars=Array.from({length:5},(_,i)=>`<span class="star${i<(c.warmth||3)?' lit':''}">★</span>`).join('');
  const tags=(c.tags||[]).map(t=>`<span class="ctag ${tagClass(t)}">#${t}</span>`).join('');
  const lastStr=days===null?'—':days===0?'Today':days+' days ago';
  return`<div class="contact-card${overdue?' overdue':''}" onclick="openDetail('${c.id}')">
    <div class="card-top">
      <div class="avatar" style="background:${col.bg};color:${col.text}">${initials(c.name)}</div>
      <div style="flex:1;min-width:0">
        <div class="card-name">${c.name}</div>
        <div class="card-role">${c.role||''}</div>
        <div class="warmth">${stars}</div>
      </div>
    </div>
    <div class="card-meta">
      ${c.met?`<div class="meta-row"><svg class="meta-icon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${c.met}</div>`:''}
      <div class="meta-row"><svg class="meta-icon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>Last: ${lastStr}</div>
    </div>
    ${tags?`<div class="card-tags">${tags}</div>`:''}
    ${(c.help||c.super)?`<div class="card-divider"></div><div class="card-footer">
      ${c.help?`<span class="help-me"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Can help</span>`:''}
      ${c.super?`<span class="superpower"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Has powers</span>`:''}
    </div>`:''}
  </div>`;
}

function openDetail(id){
  const c=contacts.find(x=>x.id===id);if(!c)return;
  currentDetailId=id;
  const col=colorFor(c.name);const days=daysSince(c.last);
  const stars=Array.from({length:5},(_,i)=>`<span class="star${i<(c.warmth||3)?' lit':''}">★</span>`).join('');
  const tags=(c.tags||[]).map(t=>`<span class="ctag ${tagClass(t)}">#${t}</span>`).join('');
  document.getElementById('detailBody').innerHTML=`
    <div class="detail-top">
      <div class="detail-avatar" style="background:${col.bg};color:${col.text}">${initials(c.name)}</div>
      <div class="detail-info">
        <div class="detail-name">${c.name}</div>
        <div class="detail-role">${c.role||''}${c.company?' · '+c.company:''}</div>
        <div class="warmth">${stars}</div>
        ${tags?`<div class="card-tags" style="margin-top:8px">${tags}</div>`:''}
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Context</div>
      <div class="detail-grid">
        ${c.met?`<div class="detail-item"><div class="detail-item-label">Where we met</div><div class="detail-item-val">${c.met}</div></div>`:''}
        <div class="detail-item"><div class="detail-item-label">Last interaction</div><div class="detail-item-val">${days===null?'Unknown':days===0?'Today':days+' days ago'}</div></div>
        ${c.email?`<div class="detail-item"><div class="detail-item-label">Email</div><div class="detail-item-val" style="font-size:12px">${c.email}</div></div>`:''}
      </div>
    </div>
    ${(c.help||c.super)?`<div class="detail-section">
      <div class="detail-section-title">Reciprocity Engine</div>
      ${c.help?`<div class="recip-box"><div class="recip-box-label recip-em">How I can help them</div><div class="recip-box-val">${c.help}</div></div>`:''}
      ${c.super?`<div class="recip-box"><div class="recip-box-label recip-purple">Their unique superpowers</div><div class="recip-box-val">${c.super}</div></div>`:''}
    </div>`:''}
    ${c.notes?`<div class="detail-section"><div class="detail-section-title">Notes</div><div style="font-size:13px;color:var(--text2);line-height:1.6">${c.notes}</div></div>`:''}
    <div style="height:1rem"></div>
  `;
  document.getElementById('detailModal').style.display='flex';
}

function editCurrent(){
  closeModal('detailModal');
  const c=contacts.find(x=>x.id===currentDetailId);if(!c)return;
  openAddModal(c);
}

function openDetail2(id){openDetail(id)}

function filterTag(t){activeTagFilter=activeTagFilter===t?null:t;render()}
function setTab(tab,el){currentTab=tab;document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));el.classList.add('active');render()}

function openAddModal(existing=null){
  document.getElementById('modalTitle').textContent=existing?'Edit Contact':'Add Contact';
  document.getElementById('editId').value=existing?existing.id:'';
  document.getElementById('fName').value=existing?existing.name:'';
  document.getElementById('fRole').value=existing?existing.role:'';
  document.getElementById('fEmail').value=existing?existing.email:'';
  document.getElementById('fCompany').value=existing?existing.company:'';
  document.getElementById('fMet').value=existing?existing.met:'';
  document.getElementById('fLast').value=existing?existing.last:'';
  document.getElementById('fHelp').value=existing?existing.help:'';
  document.getElementById('fSuper').value=existing?existing.super:'';
  document.getElementById('fTags').value=existing?(existing.tags||[]).join(', '):'';
  document.getElementById('fNotes').value=existing?existing.notes:'';
  selectedWarmth=existing?existing.warmth:3;
  updateWarmthBtns();
  document.getElementById('addModal').style.display='flex';
}
function closeModal(id){document.getElementById(id).style.display='none'}
function setWarmth(n){selectedWarmth=n;updateWarmthBtns()}
function updateWarmthBtns(){document.querySelectorAll('.warmth-btn').forEach((b,i)=>b.classList.toggle('sel',i+1===selectedWarmth))}

function saveContact(){
  const name=document.getElementById('fName').value.trim();if(!name)return alert('Name is required');
  const id=document.getElementById('editId').value||Date.now().toString();
  const tags=document.getElementById('fTags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const contact={id,name,role:document.getElementById('fRole').value.trim(),email:document.getElementById('fEmail').value.trim(),company:document.getElementById('fCompany').value.trim(),met:document.getElementById('fMet').value.trim(),last:document.getElementById('fLast').value,help:document.getElementById('fHelp').value.trim(),super:document.getElementById('fSuper').value.trim(),tags,warmth:selectedWarmth,notes:document.getElementById('fNotes').value.trim()};
  const idx=contacts.findIndex(c=>c.id===id);
  if(idx>=0)contacts[idx]=contact;else contacts.unshift(contact);
  save();closeModal('addModal');render();
}

document.getElementById('searchInput').addEventListener('input',render);
document.getElementById('addModal').addEventListener('click',function(e){if(e.target===this)closeModal('addModal')});
document.getElementById('detailModal').addEventListener('click',function(e){if(e.target===this)closeModal('detailModal')});

load();
</script>
